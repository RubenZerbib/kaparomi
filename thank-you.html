<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה</title>
  <style>
    :root {
      --bg-1: #fff8e7;
      --bg-2: #ffd3a0;
      --bg-3: #ffeacc;
      --ink: #3a2718;
      --card: #fffdf7;
      --heart: #d33b56;
      --line: #edd1ad;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Assistant", "Rubik", "Heebo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 12%, #fffef9 0 17%, transparent 39%),
        radial-gradient(circle at 87% 82%, #ffe7cb 0 16%, transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    body::before {
      width: 360px;
      height: 360px;
      top: -140px;
      left: -120px;
      background: radial-gradient(circle at center, rgba(255, 184, 83, 0.36) 0 35%, rgba(255, 184, 83, 0) 70%);
    }

    body::after {
      width: 380px;
      height: 380px;
      right: -130px;
      bottom: -150px;
      background: radial-gradient(circle at center, rgba(214, 89, 0, 0.22) 0 32%, rgba(214, 89, 0, 0) 70%);
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(760px, 100%);
      background: linear-gradient(180deg, #fffaf1 0%, var(--card) 28%, #ffffff 100%);
      border-radius: 24px;
      box-shadow: 0 20px 55px rgba(60, 36, 12, 0.24);
      padding: clamp(26px, 4vw, 44px);
      text-align: center;
      animation: floatIn 500ms ease-out both;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(110deg, rgba(255, 209, 106, 0.18), rgba(255, 255, 255, 0) 42%);
    }

    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      background: #fff1da;
      color: #7a471d;
      border: 1px solid #f1d4ad;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3.2vw, 2.4rem);
      line-height: 1.5;
      letter-spacing: 0.1px;
    }

    .heart {
      color: var(--heart);
      font-size: 1.25em;
      vertical-align: middle;
      margin-right: 2px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      font-weight: 700;
      color: #7f3f00;
      text-underline-offset: 4px;
      text-decoration-thickness: 2px;
    }

    @keyframes floatIn {
      from {
        transform: translateY(12px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="tag">אתם רשמית אנשים אחראיים</span>
    <h1>תודה שאתם שומרים על הדבר הכי מתוק והכי חשוב לנו מכל,<br>אוהבים ההורים של רומי <span class="heart" aria-label="לב">❤</span></h1>
    <a href="index.html">חזרה לתנאים (למי שמתגעגע לסעיפים)</a>
  </main>
</body>
</html>
